name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-unit:
    name: Lint, build, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install extension deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build extension
        run: npm run build

      # The MCP server has to be compiled BEFORE unit tests because the
      # integration test in vitest's `integration` workspace project spawns
      # the compiled binary as a subprocess. Otherwise it skips silently.
      - name: Install MCP server deps
        working-directory: mcp-server
        run: npm ci

      - name: Build MCP server
        working-directory: mcp-server
        run: npm run build

      - name: Unit + integration tests
        run: npm run test:unit

  e2e:
    name: E2E (Playwright + Chromium)
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build extension
        run: npm run build

      - name: Run E2E
        # MV3 service workers need a real X server; xvfb wraps the headed run.
        run: xvfb-run --auto-servernum npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
